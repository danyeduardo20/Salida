<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>¿Puedo robarte un día?</title>

    <!-- Fuente tipo cute iOS / Pinterest vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="blossoms" aria-hidden="true">
        <span class="blossom" style="left:4%; top:6%;">🌸</span>
        <span class="blossom" style="left:18%; top:2%;">🌸</span>
        <span class="blossom" style="left:42%; top:0%;">🌸</span>
        <span class="blossom" style="left:70%; top:3%;">🌸</span>
        <span class="blossom" style="left:90%; top:8%;">🌸</span>
        <span class="blossom" style="left:2%; top:55%;">🌸</span>
        <span class="blossom" style="left:13%; top:85%;">🌸</span>
        <span class="blossom" style="left:35%; top:92%;">🌸</span>
        <span class="blossom" style="left:60%; top:96%;">🌸</span>
        <span class="blossom" style="left:82%; top:80%;">🌸</span>
        <span class="blossom" style="left:94%; top:55%;">🌸</span>
        <span class="blossom" style="left:100%; top:22%;">🌸</span>
        <span class="blossom" style="left:80%; top:38%;">🌸</span>
        <span class="blossom" style="left:48%; top:18%;">🌸</span>
    </div>

    <div class="container">

        <!-- PANTALLA 1 -->
        <div id="screen1" class="screen">

            <h1>¿Puedo robarte un día? 💖</h1>

            <p>
                Piénsalo bien...
            </p>

            <div class="buttons">

                <button id="yesBtn" class="pill">
                    Sí 💕
                </button>

                <button id="noBtn" class="pill">
                    No 😔
                </button>

            </div>

        </div>

        <!-- PANTALLA 2 -->

        <div id="screen2" class="screen hidden">

            <h1>OMG 😭</h1>

            <p>
                ¿De verdad dijiste que sí?
                No lo puedo creeeeeeeerrrrr 💕
            </p>

            <div class="gif-wrapper">
                <img src="assets/emoccion.gif" alt="Emoción" class="screen-gif">
            </div>

            <button class="mainBtn" id="continueBtn">
                Continuar
            </button>

        </div>

        <!-- PANTALLA 3 -->

        <div id="screen3" class="screen hidden">

            <h1>Perfecto ✨</h1>

            <div class="gif-wrapper">
                <img src="assets/gatito.gif" alt="Gatito" class="screen-gif">
            </div>

            <p>
                Ahora dime cuándo estás disponible
            </p>

            <input type="date" id="date">

            <select id="hour">

                <option value="">Selecciona una hora</option>

                <option>5:00 PM</option>
                <option>6:00 PM</option>
                <option>7:00 PM</option>
                <option>8:00 PM o más</option>
                <option>Otra hora</option>

            </select>

            <input type="time" id="customTime" placeholder="Ingresa tu hora" style="display:none;">

            <button class="mainBtn" id="nextBtn">
                Continuar
            </button>

        </div>

        <!-- PANTALLA 4 -->

        <div id="screen4" class="screen hidden">

            <h1>Escoge un lugar 💕</h1>

            <p>
                Escoge lo que más te guste
            </p>

            <div class="places">

                <div class="card" data-place="Cena 🍽️">
                    🍽️
                    <span>Cena</span>
                </div>

                <div class="card" data-place="Café ☕">
                    ☕
                    <span>Café</span>
                </div>

                <div class="card" data-place="Cine 🎬">
                    🎬
                    <span>Cine</span>
                </div>

                <div class="card" data-place="Bar 🍹">
                    🍹
                    <span>Barcito</span>
                </div>

                <div class="card" data-place="Picnic 🧺">
                    🧺
                    <span>Parquecito</span>
                </div>
            </div>

            <button class="mainBtn" id="finishBtn">
                Confirmar cita 💖
            </button>

        </div>

        <!-- PANTALLA FINAL -->

        <div id="screen5" class="screen hidden">

            <h1>Nos vemos luego</h1>

            <p id="finalMessage"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
